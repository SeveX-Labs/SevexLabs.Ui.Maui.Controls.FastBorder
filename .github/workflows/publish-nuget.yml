name: Publish NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workloads
        run: dotnet workload install maui-android maui-ios --skip-manifest-update

      - name: Restore
        run: dotnet restore SevexLabs.Ui.Maui.Controls.FastBorder/SevexLabs.Ui.Maui.Controls.FastBorder.csproj

      - name: Pack
        run: dotnet pack SevexLabs.Ui.Maui.Controls.FastBorder/SevexLabs.Ui.Maui.Controls.FastBorder.csproj -c Release -o artifacts -p:ContinuousIntegrationBuild=true

      - name: Push NuGet packages
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push symbol packages
        run: dotnet nuget push "artifacts/*.snupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
