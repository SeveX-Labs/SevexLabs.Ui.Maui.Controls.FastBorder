name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workloads
        run: dotnet workload install maui-android maui-ios --skip-manifest-update

      - name: Restore
        run: dotnet restore SevexLabs.Ui.Maui.Controls.FastBorder/SevexLabs.Ui.Maui.Controls.FastBorder.csproj

      - name: Build Android
        run: dotnet build SevexLabs.Ui.Maui.Controls.FastBorder/SevexLabs.Ui.Maui.Controls.FastBorder.csproj -c Release -f net9.0-android36.0 --no-restore -p:ContinuousIntegrationBuild=true

      - name: Build iOS
        run: dotnet build SevexLabs.Ui.Maui.Controls.FastBorder/SevexLabs.Ui.Maui.Controls.FastBorder.csproj -c Release -f net9.0-ios --no-restore -p:ContinuousIntegrationBuild=true

      - name: Pack
        run: dotnet pack SevexLabs.Ui.Maui.Controls.FastBorder/SevexLabs.Ui.Maui.Controls.FastBorder.csproj -c Release --no-restore -o artifacts -p:ContinuousIntegrationBuild=true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*
